    depends_on:
      - phase_4_multimodal_ready_run_engine
    objective: "Replace active chatroom/chat execution with task, config-set, run-chain, run, input, output, annotation, search, and export records."
    decisions:
      legacy_data_policy: "Hide legacy chatrooms from the main UI; leave existing legacy files untouched; do not migrate."
      ui_model: "Use Tasks + Run Chains as active product concepts."
      compatibility: "Active annotations, search, and export are run-native only."
      legacy_routes: "Old /api/chat/* and /ws/chat/* may remain temporarily but are not used by the main UI."
      adapter_policy: "No dual-write interactive adapter."
    files:
      likely_backend:
        - tukey/server/routes/run_chains.py
        - tukey/server/routes/runs.py
        - tukey/server/websocket.py
        - tukey/server/routes/config.py
        - tukey/server/routes/search.py
        - tukey/server/routes/annotations.py
      likely_frontend:
        - ui/src/lib/api.ts
        - ui/src/lib/wsManager.ts
        - ui/src/stores/tukeyStore.ts
        - ui/src/components/Sidebar.tsx
        - ui/src/components/RunChainView.tsx
        - ui/src/components/ResponseCard.tsx
    behavior:
      - "New sends create Run records and persist RunInput/RunOutput as the only active execution data."
      - "Run chains provide the chat-like exploratory UX with explicit lineage."
      - "Config sets and frozen config versions replace chatroom model snapshots."
      - "The main UI does not list or create legacy chatrooms/chats."
      - "Quick setup creates provider, config set, task, and first run chain instead of chatroom/chat."
      - "Annotations target run outputs, not legacy chat messages."
      - "Search and export operate over run-native records for the active product surface."
      - "Run-chain search navigation treats chain membership as multi-valued: direct run.chain_id, chain.root_run_id, and run-chain edges all create navigable chain contexts."
      - "When a run/input/output/annotation belongs to multiple visible non-archived chains, search returns one result per chain context with chain_id and chain_name; no hidden primary-chain precedence is applied."
      - "Runs with no visible non-archived chain membership are omitted from the chain-oriented search UI until a standalone run view exists."
    delivered:
      - "Active UI now loads tasks, config sets, run chains, runs, outputs, annotations, providers, and MCP servers through a run-native Zustand store."
      - "Main sidebar lists tasks and run chains, not legacy chatrooms."
      - "Run-chain view sends prompts by creating queued runs and executing them through POST /api/runs/{run_id}/execute."
      - "Config-set editor edits ConfigSlot records and leaves frozen ConfigVersion records intact."
      - "Quick setup creates provider, config set, slots, task, and first run chain."
      - "Run-chain detail/export helper routes aggregate chain render/export data."
      - "Search indexes run-native tasks, chains, run inputs, outputs, and annotation comments."
    verification_planned:
      - "Backend focused run-native tests."
      - "cd ui && npm run build"
      - "uv run tukey"
      - "Manual browser smoke at http://localhost:8000"
    verification_completed:
      - "uv run --extra dev pytest tests\\test_run_native_routes.py tests\\test_storage.py tests\\test_run_engine.py"
      - "cd ui && npm run build"
      - "uv run tukey health smoke against http://localhost:8000/api/health"

